site_name: Backend Engineering Notes

theme:
  name: material

  logo: assets/logo.svg
  favicon: assets/favicon.svg

  palette:
    - scheme: slate
      toggle:
        icon: material/brightness-7
        name: Switch to light mode
    - scheme: default
      toggle:
        icon: material/brightness-4
        name: Switch to dark mode

  features:
    - navigation.sections
    - navigation.expand
    - navigation.instant
    - navigation.tracking
    - search.highlight
    - search.suggest
    - content.code.copy

  font: false

plugins:
  - search

extra_css:
  - assets/stylesheets/chatgpt.css

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets

nav:
  - Home: index.md
  - Interview Preparation:
      - Overview: interview-preparation/index.md
  - Java:
      - Collections: java/collections.md
      - Java Core: java/java-core.md
      - JVM Internals: java/jvm.md
      - Concurrency: java/concurrency.md
  - Spring:
      - Overview: spring/spring.md
  - Persistence:
      - Hibernate: persistence/hibernate.md
  - Databases:
      - ACID: databases/acid.md
      - Isolation Levels: databases/isolation-levels.md
      - Indexing: databases/indexing.md
      - Query Optimization: databases/query-optimization.md
      - Transactions: databases/transactions.md
  - Messaging:
      - Kafka: messaging/kafka.md
  - Kubernetes:
      - Kubernetes: kubernetes/kubernetes.md
  - System Design:
      - System Design: system-design/system-design.md